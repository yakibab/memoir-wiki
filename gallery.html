<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoir Wiki</title> 
    <link rel="icon" type="image/png" href="assets/images/MEMOIR_LOGO_WHITE.png">
    <link rel="stylesheet" href="assets/fontawesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/script.js"></script>
</head>

<body>
    <div id="header-stuff"></div>

    <main class="site-main">

        <div class="page-banner-container">
            <img src="assets/images/gallery.png" alt="Gallery" class="page-banner-image">
        </div>
        
        <div class="main-body-wrapper">

            <article class="article-content-wrapper">

                <div class="toc-container">
                    <div class="toc-box">
                        <h3>Albums</h3>
                        <ul>
                            <li><a href="#screenshots">In-Game Screenshots</a></li>
                            <li><a href="#asset">Game Assets</a></li>
                            <li><a href="#illust">Illustrations and Artwork</a></li>
                        </ul>
                    </div>
                </div>

                <div class="article-sections-container">
                    
                    <section id="screenshots" class="content-section">
                        <h2>In-Game Screenshots and Cutscenes</h2>
                        <hr>
                        <div class="gallery-grid">
                            <img src="assets/images/Gallery/Story_ss.png" alt="Main menu Screenshot" class="gallery-image">
                            <img src="assets/images/Gallery/Story_screenshot.png" alt="Story Screenshot" class="gallery-image">
                            <img src="assets/images/Gallery/gameplay_ss.png" alt="Gameplay" class="gallery-image">
                            <img src="assets/images/Gallery/gameplay_ss2.png" alt="Gameplay Night" class="gallery-image">
                            <img src="assets/images/Gallery/Day3/longhallway1.png" alt="Long Hallway" class="gallery-image">
                            <img src="assets/images/Gallery/gameplay_ss3.png" alt="Gameplay Day" class="gallery-image">
                            <img src="assets/images/Gallery/gameplayss.png" alt="Day Packing" class="gallery-image">
                            <img src="assets/images/Gallery/Day1/dream1_1.png" alt="Dream 1" class="gallery-image">
                            <img src="assets/images/Gallery/Day2/dream2.png" alt="Dream 2" class="gallery-image">
                            <img src="assets/images/Gallery/hardarcade_ss.png" alt="Hard Arcade Screenshot" class="gallery-image">
                            <img src="assets/images/Gallery/gamenightmaress.png" alt="Nightmare Screenshot" class="gallery-image">
                            <img src="assets/images/Gallery/gameover.png" alt="True Apartment Screenshot 1" class="gallery-image">
                            <video src="assets/images/Gallery/Sleep_Cutscene.mov" autoplay loop muted playsinline class="gallery-image"></video>
                            <video src="assets/images/Gallery/cutscene1.mp4" autoplay loop muted playsinline class="gallery-image"></video>
                            <video src="assets/images/Gallery/cutscene2.mp4" autoplay loop muted playsinline class="gallery-image"></video>
                            <video src="assets/images/Gallery/Cutscene3.mp4" autoplay loop muted playsinline class="gallery-image"></video>


                        </div>
                    </section>

                    <section id="asset" class="content-section">
                        <h2>Game Assets</h2>
                        <hr>
                        <div class="gallery-grid">
                            <img src="assets/images/Gallery/conceptsketch.png" alt="Concept Sketches" class="gallery-image">
                            <img src="assets/images/Gallery/Spritesheet.png" alt="Rikka spritesheet" class="gallery-image">
                            <img src="assets/images/Gallery/menu_concept2.png" alt="Menu Concept" class="gallery-image">
                            <img src="assets/images/Gallery/rikka_concept.jpg" alt="Rikka Concept Art" class="gallery-image">
                            <img src="assets/images/Gallery/EntitySprite1.png" alt="Rikka Concept" class="gallery-image">
                            <img src="assets/images/Gallery/EyeEntity1.png" alt="Rikka Concept Night" class="gallery-image">
                            <img src="assets/images/Gallery/Nplatformer-wall.png" alt="Nightmare Platformer Wall" class="gallery-image">
                            <img src="assets/images/Gallery/Nplatformer-sheet.png" alt="Nightmare Platformer Sheet" class="gallery-image">
                            <img src="assets/images/Gallery/apartment_sprites.png" alt="Apartment Spritesheet" class="gallery-image">
                            <img src="assets/images/Gallery/letter.png" alt="Letter" class="gallery-image">
                            <img src="assets/images/Gallery/locket.png" alt="Locket" class="gallery-image">
                            <img src="assets/images/Gallery/pills.png" alt="Pills" class="gallery-image">
                        </div>
                    </section>

                    <section id="illust" class="content-section">
                        <h2>Illustrations and Artwork</h2>
                        <hr>
                        <div class="gallery-grid">
                            <img src="assets/images/Gallery/Illustrations/RenRikka.png" alt="Ren and Rikka" class="gallery-image">
                            <img src="assets/images/Gallery/Illustrations/RenRikka1.png" alt="Rikka Illustration" class="gallery-image">
                            <img src="assets/images/Gallery/Illustrations/Rikka1.png" alt="Rikka Illustration 2" class="gallery-image">
                            <img src="assets/images/Gallery/Illustrations/rikkapills.png" alt="Rikka Illustration 3" class="gallery-image">
                            <img src="assets/images/Gallery/Illustrations/RikkaSleep.png" alt="Rikka Illustration 4" class="gallery-image">
                            <img src="assets/images/Gallery/Illustrations/RikkaIllust.png" alt="Rikka Illustration 5" class="gallery-image">
                        </div>
                    </section>
                </div>
            </article>
            </div> 
    </main>
    <div id="lightbox-modal" class="lightbox">
        <span class="lightbox-close">&times;</span>
        
        <img class="lightbox-content" id="lightbox-img" style="display: none;">
        
        <video class="lightbox-content" id="lightbox-video" style="display: none;" playsinline></video>
    </div>
</body>
</html>
